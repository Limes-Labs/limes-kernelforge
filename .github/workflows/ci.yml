name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run public smoke
        run: scripts/run_smoke.sh
      - name: Run public audit
        run: python3 scripts/run_public_audit.py
      - name: Check public smoke baseline
        run: python3 scripts/check_public_baseline.py --input baselines/public-smoke-baseline.json
      - name: Validate challenge contract
        run: python3 -m json.tool challenge.json >/tmp/challenge.json
      - name: Validate GitHub YAML
        run: ruby -e 'require "yaml"; Dir[".github/**/*.yml"].each { |path| YAML.load_file(path) }'
      - name: Validate JSON templates
        run: |
          python3 -m json.tool templates/submission.json >/tmp/submission.json
          python3 -m json.tool templates/submission-bundle.example.json >/tmp/submission-bundle.example.json
          python3 -m json.tool templates/leaderboard-entry.json >/tmp/leaderboard-entry.json
          python3 -m json.tool templates/agent-notes.example.json >/tmp/agent-notes.example.json
          python3 -m json.tool templates/search-ledger.example.json >/tmp/search-ledger.example.json
          python3 -m json.tool templates/replay-result.example.json >/tmp/replay-result.example.json
          python3 -m json.tool templates/promotion-packet.example.json >/tmp/promotion-packet.example.json
          python3 -m json.tool baselines/public-smoke-baseline.json >/tmp/public-smoke-baseline.json
          python3 -m json.tool examples/limeslabs/leaderboard.example.json >/tmp/limeslabs-leaderboard.example.json
          python3 -m json.tool verifier/replay-contract.json >/tmp/replay-contract.json
          python3 -m json.tool verifier/task-spec.json >/tmp/task-spec.json
          python3 -m json.tool verifier/trusted-runner-manifest.example.json >/tmp/trusted-runner-manifest.example.json
          python3 -m json.tool verifier/baseline-record.example.json >/tmp/baseline-record.example.json
      - name: Validate submission guard entrypoint
        run: python3 scripts/check_submission.py --help >/tmp/check-submission-help.txt
      - name: Validate local bundle guard entrypoint
        run: python3 scripts/validate_local_bundle.py --help >/tmp/validate-local-bundle-help.txt
      - name: Validate source bundle guard entrypoints
        run: |
          python3 scripts/build_submission_bundle.py --help >/tmp/build-submission-bundle-help.txt
          python3 scripts/validate_submission_bundle.py --help >/tmp/validate-submission-bundle-help.txt
      - name: Validate limeslabs fixture ingestion
        run: python3 scripts/validate_leaderboard.py --input examples/limeslabs/leaderboard.example.json
      - name: Validate agent notes example
        run: python3 scripts/validate_agent_notes.py --input templates/agent-notes.example.json
      - name: Validate search ledger example
        run: python3 scripts/validate_search_ledger.py --input templates/search-ledger.example.json
      - name: Validate replay-result example
        run: python3 scripts/validate_replay_result.py --input templates/replay-result.example.json
      - name: Validate runner manifest example
        run: python3 scripts/validate_runner_manifest.py --input verifier/trusted-runner-manifest.example.json
      - name: Validate baseline record example
        run: python3 scripts/validate_baseline_record.py --input verifier/baseline-record.example.json
      - name: Validate promotion packet example
        run: python3 scripts/validate_promotion_packet.py --input templates/promotion-packet.example.json
      - name: Check whitespace
        run: git diff --check
