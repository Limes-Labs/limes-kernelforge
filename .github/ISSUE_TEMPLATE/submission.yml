name: Candidate submission
description: Propose a KernelForge candidate for public smoke review or fixed-runner replay.
title: "Candidate: <short kernel method>"
labels: ["candidate", "submission"]
body:
  - type: markdown
    attributes:
      value: |
        Local timings are not official rankings. Use this form to document a candidate artifact for review or trusted fixed-runner replay.
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Commit SHA or branch containing only editable-path changes.
      placeholder: "abc1234"
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Requested status
      options:
        - candidate
        - fixed-runner replay request
        - replicated replay request
        - integration audit request
    validations:
      required: true
  - type: checkboxes
    id: editable_paths
    attributes:
      label: Editable-path confirmation
      options:
        - label: I changed only `solution/rmsnorm.py`, `solution/rope.py`, `solution/attention.py`, `solution/kv_decode.py`, or `solution/native/README.md`.
          required: true
        - label: I did not edit `harness/**`, `baselines/**`, `cases/**`, `verifier/**`, `hidden_cases/**`, `challenge.json`, `score.json`, or `leaderboard/**`.
          required: true
        - label: I read `verifier/task-spec.json` and understand that public timings are candidate-only.
          required: true
  - type: textarea
    id: method
    attributes:
      label: Method summary
      description: Describe the primitive, backend, and optimization idea.
    validations:
      required: true
  - type: textarea
    id: smoke
    attributes:
      label: Public smoke output
      description: Paste the JSON output from `scripts/run_smoke.sh`.
      render: json
    validations:
      required: true
  - type: textarea
    id: preflight
    attributes:
      label: Preflight output
      description: Paste output from `python3 scripts/check_submission.py --manifest submission.json --base origin/main` and `python3 scripts/validate_local_bundle.py --manifest submission.json --base origin/main`.
      render: json
    validations:
      required: true
  - type: textarea
    id: agent_notes
    attributes:
      label: Agent notes or ablation log
      description: Paste `python3 scripts/validate_agent_notes.py --input agent-notes.json` output, or explain why no agent-run notes were used.
    validations:
      required: true
  - type: textarea
    id: search_ledger
    attributes:
      label: Search ledger
      description: Paste `python3 scripts/validate_search_ledger.py --input search-ledger.json` output, or explain why there was only one manual attempt.
    validations:
      required: true
  - type: textarea
    id: replay_result
    attributes:
      label: Trusted replay evidence
      description: For verified or later requests, paste `python3 scripts/validate_replay_result.py --input replay-result.json` output. For candidate-only issues, write `candidate only`.
    validations:
      required: true
  - type: textarea
    id: promotion_packet
    attributes:
      label: Promotion packet evidence
      description: For promoted or later requests, paste `python3 scripts/validate_promotion_packet.py --input promotion-packet.json` output. For candidate-only issues, write `candidate only`.
    validations:
      required: true
  - type: textarea
    id: numerical_risk
    attributes:
      label: Numerical and shape risks
      description: Name tolerated error risks, hidden-shape risks, and known regressions.
    validations:
      required: true
  - type: textarea
    id: hardware
    attributes:
      label: Local hardware and backend
      description: Include CPU/GPU/Mac details, Python version, native code status, and timing variance if known.
    validations:
      required: true
